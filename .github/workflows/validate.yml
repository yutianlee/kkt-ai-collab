name: validate

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile
        run: python -m py_compile math_collab/orchestrator.py math_collab/human.py math_collab/normalize_markdown.py math_collab/api_smoke.py math_collab/bootstrap_judge.py
      - name: Dry run
        run: python -m math_collab.orchestrator --config config/agents.example.json --problem problems/kkt_conjecture.md --rounds 1 --dry-run --run-id ci-smoke --no-state-update
